global:
  scrape_interval:     15s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert.rules

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "rediscloud"
    scrape_interval: 5s
    scrape_timeout:  4s
    metrics_path:    /
    scheme:          https
    tls_config:      { insecure_skip_verify: true }
    static_configs:
      - targets: ["${REDIS_CLOUD_INTERNAL_ENDPOINT}:8070"]

  - job_name: "rediscloud-v2"
    scrape_interval: 5s
    scrape_timeout:  4s
    metrics_path:    /v2
    scheme:          https
    tls_config:      { insecure_skip_verify: true }
    static_configs:
      - targets: ["${REDIS_CLOUD_INTERNAL_ENDPOINT}:8070"]

  - job_name: "autoscaler"
    scrape_interval: 15s
    metrics_path:    /actuator/prometheus
    scheme:          http
    static_configs:
      - targets: ["${REDIS_CLOUD_AUTOSCALER_HOST}:8080"]
