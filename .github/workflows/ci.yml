name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: |
          python -m compileall -q app/

      - name: Env contract (new name + legacy DEMO_DB_ID alias)
        env:
          REDIS_HOST_AND_PORT: test:1
          REDIS_PASSWORD: test
          REDIS_CLOUD_API_KEY: test
          REDIS_CLOUD_ACCOUNT_KEY: test
          REDIS_CLOUD_SUBSCRIPTION_ID: "1"
        run: |
          # preferred name
          REDIS_CLOUD_DATABASE_ID=42 python -c "import app.config as c; assert c.DB_ID == 42, c.DB_ID"
          # legacy alias must still resolve
          DEMO_DB_ID=99 python -c "import app.config as c; assert c.DB_ID == 99, c.DB_ID"
          # scheduled scale-down: OFF by default (production-safe), opt-in with true
          REDIS_CLOUD_DATABASE_ID=1 python -c "import app.config as c; assert c.AUTO_RESET_ACTIVE is False"
          AUTO_RESET_ENABLED=true REDIS_CLOUD_DATABASE_ID=1 python -c "import app.config as c; assert c.AUTO_RESET_ACTIVE is True"
          AUTO_RESET_ENABLED=true AUTO_RESET_SECONDS=0 REDIS_CLOUD_DATABASE_ID=1 python -c "import app.config as c; assert c.AUTO_RESET_ACTIVE is False"

      - name: Validate docker-compose.yml
        run: |
          cp .env.example .env
          # Provide just enough to make compose config happy
          cat >> .env <<EOF
          REDIS_HOST_AND_PORT=test:1
          REDIS_PASSWORD=test
          REDIS_CLOUD_API_KEY=test
          REDIS_CLOUD_ACCOUNT_KEY=test
          REDIS_CLOUD_SUBSCRIPTION_ID=1
          REDIS_CLOUD_DATABASE_ID=1
          EOF
          docker compose config --quiet

      - name: Validate Dockerfile
        run: docker buildx build --check .

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build (multi-arch, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: redis-cloud-autoscaler-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
