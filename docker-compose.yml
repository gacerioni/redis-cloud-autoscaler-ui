# =============================================================================
# Redis Cloud Autoscaler — distributable demo stack
#
# Five services, all configured from .env:
#   - init-config   (alpine, runs once; renders Prometheus templates → volume)
#   - autoscaler    (upstream: redis-field-engineering/redis-cloud-autoscaler)
#   - prometheus    (reads rendered config from the shared volume)
#   - alertmanager  (deduplicates and webhooks the autoscaler)
#   - ui            (this repo: FastAPI + WebSocket + SPA)
#
# Bring up:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#
# For TLS / public deployment, additionally use:
#   docker compose -f docker-compose.yml -f docker-compose.public.yml up -d
# =============================================================================

x-image-ui: &image-ui ${UI_IMAGE:-gacerioni/redis-cloud-autoscaler-ui:latest}

services:

  # ---- init: render Prometheus templates ------------------------------------
  # Alpine + envsubst. Runs once, writes the rendered config files into a
  # shared volume, then exits. Prometheus & Alertmanager depend on its
  # successful completion before starting.
  init-config:
    image: alpine:3.20
    container_name: autoscaler-init
    env_file: .env
    volumes:
      - ./prometheus:/templates:ro
      - prometheus-config:/shared
    command:
      - sh
      - -ec
      - |
        apk add --no-cache gettext curl jq > /dev/null
        export REDIS_CLOUD_AUTOSCALER_HOST=autoscaler
        export THROUGHPUT_THRESHOLD_OPS=$$(( $${BASELINE_OPS:-25000} * $${THROUGHPUT_THRESHOLD_PCT:-80} / 100 ))
        MEM_ENABLED=$$(echo "$${MEMORY_SCALING_ENABLED:-false}" | tr '[:upper:]' '[:lower:]')

        # --- Validate REST API credentials shape ---------------------------
        # Catches the most common .env editing mistakes BEFORE any HTTP call:
        # 1) Inline comments that leaked into the value
        # 2) Quote marks left around the value
        # 3) Suspicious lengths (Redis Cloud keys are typically ~50 chars)
        for VAR in REDIS_CLOUD_ACCOUNT_KEY REDIS_CLOUD_API_KEY REDIS_CLOUD_SUBSCRIPTION_ID DEMO_DB_ID; do
          VAL=$$(eval "echo \$$$$VAR")
          if [ -z "$$VAL" ]; then
            echo "ERROR: $$VAR is empty in .env"; exit 1
          fi
          case "$$VAL" in
            *' '*|*'#'*|*'"'*|*"'"*)
              echo "ERROR: $$VAL looks malformed for $$VAR (contains space / # / quote)."
              echo "       Did you leave an inline comment or quotes in .env? Keep comments on their own lines."
              exit 1 ;;
          esac
        done
        # Both REST keys should be ~50 chars; warn loudly if very off.
        ACC_LEN=$${#REDIS_CLOUD_ACCOUNT_KEY}
        API_LEN=$${#REDIS_CLOUD_API_KEY}
        if [ "$$ACC_LEN" -lt 30 ] || [ "$$API_LEN" -lt 30 ]; then
          echo "ERROR: REST API keys look too short (ACCOUNT=$$ACC_LEN API=$$API_LEN chars)."
          echo "       Expected ~50 each. Re-check .env."
          exit 1
        fi

        # --- Discover Prometheus endpoint via REST API ---------------------
        # Always probe the REST API at boot — it doubles as a credential
        # smoke test AND auto-discovers REDIS_CLOUD_INTERNAL_ENDPOINT if
        # the user didn't pin it. We check HTTP status BEFORE feeding the
        # body to jq, so credential errors produce a readable message
        # instead of "jq: parse error".
        echo "probing REST API: GET /subscriptions/$${REDIS_CLOUD_SUBSCRIPTION_ID}"
        HTTP_CODE=$$(curl -sS --max-time 15 -o /tmp/sub.json -w "%{http_code}" \
          -H "Accept: application/json" \
          -H "x-api-key: $${REDIS_CLOUD_ACCOUNT_KEY}" \
          -H "x-api-secret-key: $${REDIS_CLOUD_API_KEY}" \
          "$${REDIS_CLOUD_API_BASE:-https://api.redislabs.com/v1}/subscriptions/$${REDIS_CLOUD_SUBSCRIPTION_ID}" || echo "000")
        if [ "$$HTTP_CODE" != "200" ]; then
          echo "ERROR: REST API returned HTTP $$HTTP_CODE."
          echo "       Common causes:"
          echo "         500 → REDIS_CLOUD_ACCOUNT_KEY / REDIS_CLOUD_API_KEY are swapped in .env"
          echo "               (ACCOUNT_KEY is the 'Account key' / public; API_KEY is the 'User key' / secret)"
          echo "         401 → key revoked or wrong account"
          echo "         404 → REDIS_CLOUD_SUBSCRIPTION_ID does not exist"
          echo "       Raw body (first 400 bytes):"
          head -c 400 /tmp/sub.json; echo
          exit 1
        fi
        if [ -z "$${REDIS_CLOUD_INTERNAL_ENDPOINT}" ]; then
          RAW=$$(jq -r ".prometheusEndpoint // empty" /tmp/sub.json)
          export REDIS_CLOUD_INTERNAL_ENDPOINT=$${RAW%%:*}
          if [ -z "$${REDIS_CLOUD_INTERNAL_ENDPOINT}" ]; then
            echo "ERROR: subscription returned no prometheusEndpoint."
            echo "       Is this an Essentials subscription? The autoscaler requires Pro."
            exit 1
          fi
          echo "auto-discovered prometheusEndpoint: $${REDIS_CLOUD_INTERNAL_ENDPOINT}"
        fi

        echo "rendering: endpoint=$${REDIS_CLOUD_INTERNAL_ENDPOINT} threshold=$$THROUGHPUT_THRESHOLD_OPS memory=$$MEM_ENABLED"
        # IMPORTANT: pass explicit var list to envsubst. Without it, envsubst
        # would also expand Prometheus' own `$$labels.foo` syntax in the alert
        # rules templates, mangling them to `.foo` and breaking template
        # evaluation at alert time. We only want to substitute OUR variables.
        SUBST_VARS='$${REDIS_CLOUD_INTERNAL_ENDPOINT} $${REDIS_CLOUD_AUTOSCALER_HOST} $${THROUGHPUT_THRESHOLD_OPS} $${THROUGHPUT_THRESHOLD_FOR} $${MEMORY_THRESHOLD_PCT} $${MEMORY_THRESHOLD_FOR}'
        envsubst "$$SUBST_VARS" < /templates/prometheus.template.yml > /shared/prometheus.yml
        envsubst "$$SUBST_VARS" < /templates/alert.rules.template    > /shared/alert.rules
        if [ "$$MEM_ENABLED" = "true" ] || [ "$$MEM_ENABLED" = "1" ] || [ "$$MEM_ENABLED" = "yes" ]; then
          echo "memory scaling: ENABLED"
          envsubst "$$SUBST_VARS" < /templates/alert.rules.memory.template >> /shared/alert.rules
        else
          echo "memory scaling: disabled (set MEMORY_SCALING_ENABLED=true to turn on)"
        fi
        cp /templates/alertmanager.yml /shared/alertmanager.yml
        echo "rendered:"; ls -la /shared
        echo "alert.rules content (first 40 lines):"; head -40 /shared/alert.rules

  # ---- data plane -----------------------------------------------------------
  autoscaler:
    image: ghcr.io/redis-field-engineering/redis-cloud-autoscaler:latest
    container_name: autoscaler
    restart: unless-stopped
    env_file: .env
    environment:
      ALERT_MANAGER_HOST:          alertmanager
      ALERT_MANAGER_PORT:          "9093"
      REDIS_CLOUD_AUTOSCALER_HOST: autoscaler
    # No `ports:` mapping by default — only reachable on the internal
    # compose network. Use docker-compose.expose.yml to publish for debug.
    expose: ["8080"]
    healthcheck:
      # /rules returns 200 once Spring is fully up
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/rules || exit 1"]
      interval: 10s
      timeout:  4s
      retries:  18      # ~3 min grace period for Spring Boot warmup
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - prometheus-config:/etc/prometheus:ro
    expose: ["9090"]
    depends_on:
      init-config:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - prometheus-config:/etc/alertmanager:ro
    expose: ["9093"]
    depends_on:
      init-config:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9093/-/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- web UI ---------------------------------------------------------------
  ui:
    image: *image-ui
    container_name: autoscaler-ui
    restart: unless-stopped
    env_file: .env
    environment:
      PROMETHEUS_URL:   http://prometheus:9090
      AUTOSCALER_URL:   http://autoscaler:8080
      ALERTMANAGER_URL: http://alertmanager:9093
    volumes:
      # Read-only socket so the UI can `docker logs autoscaler` for the
      # "Autoscaler events" panel. Remove this mount if you want stricter
      # isolation; the panel will simply stay empty.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${UI_PORT:-8000}:8000"
    depends_on:
      autoscaler:
        condition: service_healthy
      prometheus:
        condition: service_healthy
      alertmanager:
        condition: service_healthy
    healthcheck:
      # /healthz is intentionally unauthenticated (auth-protected paths are
      # /api/* and /ws — the docker daemon doesn't carry credentials).
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  prometheus-config:
